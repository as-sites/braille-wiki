  # ════════════════════════════════════════════════════════════

  /api/admin/documents/{id}/move:
    put:
      operationId: moveDocument
      summary: Move a document (and subtree) to a new parent
      tags: [Navigation]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
