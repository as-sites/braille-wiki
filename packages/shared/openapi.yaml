      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDocumentRequest"
      responses:
        "200":
          description: Document with updated path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Target path already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/documents/reorder:
    put:
      operationId: reorderChildren
      summary: Reorder sibling documents under a parent
      tags: [Navigation]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Reorder successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ════════════════════════════════════════════════════════════
  # ADMIN — MEDIA
  # ════════════════════════════════════════════════════════════

  /api/admin/media:
    get:
      operationId: listMedia
      summary: List media files
      tags: [Media]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - name: mime_type
          in: query
          schema:
            type: string
          description: Filter by MIME type (e.g. `image/png`).
        - name: search
          in: query
          schema:
            type: string
          description: Search filename or alt text.
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of media
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Media"
                  total:
                    type: integer
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: uploadMedia
      summary: Upload a media file to R2
      tags: [Media]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                alt_text:
                  type: string
      responses:
        "201":
          description: Created media record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
        "400":
          description: Validation error (missing file, unsupported type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/media/{id}:
    put:
      operationId: updateMedia
      summary: Update media metadata
      tags: [Media]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/MediaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMediaRequest"
      responses:
        "200":
          description: Updated media record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteMedia
      summary: Delete a media file
      description: Removes from R2 and deletes the database row.
      tags: [Media]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/MediaId"
      responses:
        "200":
          description: Deletion successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ════════════════════════════════════════════════════════════
  # ADMIN — USERS
  # ════════════════════════════════════════════════════════════

  /api/admin/users:
    get:
      operationId: listUsers
      summary: List all users
      tags: [Users]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (admin role required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createUser
      summary: Create or invite a user
      tags: [Users]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/invites:
    get:
      operationId: listUserInvites
      summary: List user invites
      tags: [Users, Invites]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: List of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInvite"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (admin role required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createUserInvite
      summary: Create and send a user invite
      tags: [Users, Invites]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInvite"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Active invite or active user conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/invites/{id}/resend:
    post:
      operationId: resendUserInvite
      summary: Resend a pending invite
      tags: [Users, Invites]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/InviteId"
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInvite"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invite cannot be resent in current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/invites/{id}/revoke:
    post:
      operationId: revokeUserInvite
      summary: Revoke a pending invite
      tags: [Users, Invites]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/InviteId"
      responses:
        "200":
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInvite"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/{id}:
    put:
      operationId: updateUser
      summary: Update a user
      description: Editors cannot promote/demote admins.
      tags: [Users]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteUser
      summary: Delete a user
      description: |
        Admins cannot be deleted by editors. An admin cannot delete themselves.
      tags: [Users]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Deletion successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/invite/verify:
    post:
      operationId: verifyInviteToken
      summary: Verify invite token validity
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInviteRequest"
      responses:
        "200":
          description: Invite token status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyInviteResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/invite/accept:
    post:
      operationId: acceptInvite
      summary: Accept invite and set password
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "200":
          description: Invite accepted and account activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResponse"
        "400":
          description: Validation error or unusable token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invite already used/revoked/expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ════════════════════════════════════════════════════════════
  # ADMIN — API KEYS
  # ════════════════════════════════════════════════════════════

  /api/admin/api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      description: Returns keys for the current user, or all keys if admin.
      tags: [API Keys]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: List of API keys (key values are never returned)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createApiKey
      summary: Generate a new API key
      description: The raw key is returned once and cannot be retrieved again.
      tags: [API Keys]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: Created API key (includes raw key value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/api-keys/{id}:
    delete:
      operationId: deleteApiKey
      summary: Revoke an API key
      tags: [API Keys]
      security:
        - sessionAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ════════════════════════════════════════════════════════════
  # INTERNAL
  # ════════════════════════════════════════════════════════════

  /internal/cache/invalidate:
    post:
      operationId: invalidateCache
      summary: Invalidate Astro route cache by tags
      description: |
        Called by the Hono API at publish/unpublish time. Protected by a shared
        secret (`x-internal-secret` header). Only accessible on the internal
        Docker network.
      tags: [Internal]
      parameters:
        - name: x-internal-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CacheInvalidateRequest"
      responses:
        "200":
          description: Cache invalidated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Invalid or missing internal secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
