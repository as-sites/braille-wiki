# Dev compose — standalone, no proxy.
# Usage: docker compose -f docker-compose.dev.yml up --build
#
#   api   → http://localhost:3001
#   web   → http://localhost:4321
#   admin → http://localhost:5173

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: pnpm --filter @braille-docs/api dev
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/db/dist
      - /app/packages/shared/dist
      - /app/packages/editor-schema/dist
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: pnpm --filter @braille-docs/web dev --host 0.0.0.0 --port 4321
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/db/dist
      - /app/packages/shared/dist
    ports:
      - "4321:4321"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: builder
    command: pnpm --filter @braille-docs/admin dev --host 0.0.0.0 --port 5173
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/editor-schema/dist
      - /app/packages/shared/dist
    ports:
      - "5173:5173"
