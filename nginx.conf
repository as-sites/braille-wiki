server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Clean URLs: try the exact path, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Return 404 for missing files (MkDocs generates per-page index.html files)
    error_page 404 /404.html;
}
