server {
    listen       ${PORT};
    server_name  _;

    # Railway terminates TLS before nginx and forwards requests on an internal
    # port. Keep redirects relative so nginx doesn't leak :8080 in Location.
    absolute_redirect off;
    port_in_redirect off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Clean URLs: try the exact path, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Force trailing slash so Decap resolves config.yml under /admin/.
    # Preserve query string so the OAuth callback state/code params survive.
    location = /admin {
        return 301 /admin/$is_args$args;
    }

    # Decap expects a YAML content type for config parsing.
    location = /admin/config.yml {
        default_type text/yaml;
        try_files $uri =404;
    }

    # Return 404 for missing files (MkDocs generates per-page index.html files)
    error_page 404 /404.html;
}
