name = "braille-docs-api"
main = "src/worker.ts"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[vars]
NODE_ENV = "production"
R2_PUBLIC_URL = "https://s3.braille.ay.ms"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "braille-wiki"

[[routes]]
pattern = "api.braille.ay.ms/*"
custom_domain = true